{% extends "base.html" %}
{% block content %}
<article>
    <h1 class="mb-3">{{ post.title }}</h1>
    <div class="text-muted mb-3">
        作者: <a href="#">{{ post.author.username }}</a> | 
        发布时间: {{ post.date_posted.strftime('%Y-%m-%d %H:%M') }}
    </div>
    <div class="content">
        {{ post.content }}
    </div>
    {% if post.author == current_user %}
    <div class="mt-3">
        <a class="btn btn-secondary btn-sm" href="{{ url_for('update_post', post_id=post.id) }}">编辑</a>
        <form action="{{ url_for('delete_post', post_id=post.id) }}" method="POST" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">删除</button>
        </form>
    </div>
    {% endif %}
</article>
{% endblock %}
