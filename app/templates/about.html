{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2>关于项目</h2>
        <p>这是一个完整的 Flask 全栈项目，包含以下功能：</p>
        <ul>
            <li>用户注册和登录</li>
            <li>SQLite 数据库存储</li>
            <li>文章发布和管理</li>
            <li>用户中心</li>
            <li>后台管理系统</li>
            <li>Bootstrap 美化界面</li>
        </ul>
        <hr>
        <h4>技术栈</h4>
        <ul>
            <li>后端: Flask 2.3+</li>
            <li>数据库: SQLAlchemy + SQLite</li>
            <li>表单: Flask-WTF</li>
            <li>前端: Bootstrap 5</li>
        </ul>
    </div>
</div>
{% endblock %}
